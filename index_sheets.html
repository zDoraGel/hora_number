const GS_URL = 'https://script.google.com/macros/s/AKfycbxA4rjW8ORXydtnv0uF1ON0xm-NAKGn2jejyfuecnpvOnSa7u3_RlMYXH4zCJJGimEl/exec';

const IS_MOCK = window.location.hostname.includes('github.io')
             || window.location.hostname.includes('github.com')
             || window.location.hostname === 'localhost'
             || window.location.hostname === '127.0.0.1'
             || window.location.protocol === 'file:'
             || window.location.hostname === ''
             || !window.location.hostname;

const API_URL = 'api.php';

// Mock codes สำหรับทดสอบ
const MOCK_CODES = ['TESTCODE','AAAABBBB','DEMO1234','TEST1234'];

function mockApi(body) {
  if (body.action === 'verify_code') {
    const ok = MOCK_CODES.includes(body.code.toUpperCase());
    return { ok, msg: ok ? '' : 'โค้ดไม่ถูกต้องหรือถูกใช้แล้วค่ะ' };
  }
  if (body.action === 'save_reading') return { ok: true };
  if (body.action === 'get_meanings') return { ok: false };
  if (body.action === 'get_calendar') return { ok: false };
  return { ok: true };
}

async function callApi(body) {
  // Mock mode: รันแบบ file:// หรือ localhost หรือ github.io
  if (IS_MOCK) return mockApi(body);
  // Production: ลอง GAS ก่อน ถ้าล้มเหลว fallback mock
  try {
    var url = GS_URL + '?d=' + encodeURIComponent(JSON.stringify(body));
    var res = await fetch(url, { mode: 'cors' });
    var text = await res.text();
    try {
      var parsed = JSON.parse(text);
      return parsed;
    } catch(e) { /* JSON parse fail → fallback */ }
  } catch(e) { /* network error → fallback */ }
  // Fallback mock สำหรับทุก environment
  return mockApi(body);
}

const { useState, useEffect, useCallback } = React;
// CALENDAR_DATA: โหลดจาก Google Sheets + fallback hardcode
// format: {"YYYY-MM-DD": [dow, isWaning, zodiac], ...}
let CALENDAR_DATA = {};

async function loadCalendarFromGS() {
  // Mock mode: ใช้ fallback ทันที ไม่ fetch GS
  if (IS_MOCK) { useCalendarFallback(); return; }
  try {
    // ลอง localStorage ก่อน (cache)
    const cached = localStorage.getItem('cal_data_v3');
    const cachedTime = localStorage.getItem('cal_data_time');
    const ONE_DAY = 24*60*60*1000;
    if (cached && cachedTime && (Date.now() - parseInt(cachedTime)) < ONE_DAY) {
      CALENDAR_DATA = JSON.parse(cached);
      console.log('✅ Calendar from cache:', Object.keys(CALENDAR_DATA).length);
      return;
    }
    // โหลดจาก GS
    const res = await fetch(GS_URL + '?d=' + encodeURIComponent(JSON.stringify({ action:'get_calendar' })));
    const data = await res.json();
    if (data.ok && data.data && Object.keys(data.data).length > 0) {
      CALENDAR_DATA = data.data;
      localStorage.setItem('cal_data_v3', JSON.stringify(CALENDAR_DATA));
      localStorage.setItem('cal_data_time', Date.now().toString());
      console.log('✅ Calendar from GS:', Object.keys(CALENDAR_DATA).length);
    } else {
      console.warn('⚠️ GS calendar empty, using hardcode fallback');
      useCalendarFallback();
    }
  } catch(e) {
    console.warn('⚠️ Calendar GS failed, using fallback:', e.message);
    useCalendarFallback();
  }
}

  "1-8": "\u0E08\u0E30\u0E21\u0E35\u0E01\u0E32\u0E23\u0E15\u0E01\u0E25\u0E07\u0E21\u0E31\u0E48\u0E19\u0E2B\u0E21\u0E32\u0E22\u0E17\u0E35\u0E48\u0E41\u0E19\u0E48\u0E19\u0E2D\u0E19\u0E19\u0E31\u0E49\u0E19\u0E23\u0E2D\u0E2D\u0E22\u0E39\u0E48 \u0E08\u0E30\u0E40\u0E1B\u0E47\u0E19\u0E40\u0E23\u0E37\u0E48\u0E2D\u0E07\u0E14\u0E35\u0E01\u0E47\u0E44\u0E14\u0E49 \u0E08\u0E30\u0E40\u0E1B\u0E47\u0E19\u0E40\u0E23\u0E37\u0E48\u0E2D\u0E07\u0E23\u0E49\u0E32\u0E22\u0E01\u0E47\u0E21\u0E35\u0E2A\u0E48\u0E27\u0E19\u0E0A\u0E27\u0E19\u0E43\u0E2B\u0E49\u0E2A\u0E07\u0E2A\u0E31\u0E22 \u0E40\u0E23\u0E48\u0E07\u0E23\u0E30\u0E27\u0E31\u0E07\u0E23\u0E30\u0E44\u0E27 \u0E2D\u0E22\u0E48\u0E32\u0E1B\u0E25\u0E48\u0E2D\u0E22\u0E01\u0E32\u0E22\u0E1B\u0E25\u0E48\u0E2D\u0E22\u0E43\u0E08\u0E43\u0E2B\u0E49\u0E40\u0E1E\u0E25\u0E34\u0E14\u0E40\u0E25\u0E34\u0E19 \u0E08\u0E30\u0E40\u0E14\u0E34\u0E19\u0E2B\u0E25\u0E07\u0E17\u0E32\u0E07",
  "1-9": "\u0E08\u0E30\u0E21\u0E35\u0E40\u0E23\u0E37\u0E48\u0E2D\u0E07\u0E40\u0E28\u0E23\u0E49\u0E32 \u0E40\u0E2A\u0E35\u0E22\u0E2D\u0E32\u0E23\u0E21\u0E13\u0E4C \u0E40\u0E2A\u0E35\u0E22\u0E04\u0E27\u0E32\u0E21\u0E23\u0E39\u0E49\u0E2A\u0E36\u0E01 \u0E02\u0E2D\u0E07\u0E08\u0E30\u0E2B\u0E32\u0E22 \u0E04\u0E27\u0E32\u0E21\u0E23\u0E31\u0E01\u0E08\u0E30\u0E15\u0E35\u0E08\u0E32\u0E01 \u0E22\u0E32\u0E01\u0E17\u0E35\u0E48\u0E08\u0E30\u0E07\u0E49\u0E2D\u0E07\u0E2D\u0E19 \u0E17\u0E33\u0E43\u0E2B\u0E49\u0E2D\u0E48\u0E2D\u0E19\u0E43\u0E08 \u0E43\u0E04\u0E23\u0E08\u0E30\u0E23\u0E39\u0E49 \u0E08\u0E30\u0E2A\u0E39\u0E49 \u0E2B\u0E23\u0E37\u0E2D\u0E08\u0E30\u0E16\u0E2D\u0E22 \u0E43\u0E2B\u0E49\u0E1B\u0E25\u0E48\u0E2D\u0E22\u0E44\u0E27\u0E49\u0E01\u0E48\u0E2D\u0E19 \u0E2D\u0E22\u0E48\u0E32\u0E08\u0E23\u0E34\u0E07\u0E08\u0E31\u0E07\u0E01\u0E31\u0E1A\u0E04\u0E27\u0E32\u0E21\u0E17\u0E38\u0E01\u0E02\u0E4C",
  "2-2": "\u0E2A\u0E34\u0E48\u0E07\u0E17\u0E35\u0E48\u0E2B\u0E27\u0E31\u0E07\u0E17\u0E35\u0E48\u0E23\u0E2D\u0E04\u0E2D\u0E22\u0E21\u0E32\u0E16\u0E36\u0E07\u0E41\u0E25\u0E49\u0E27 \u0E2D\u0E22\u0E32\u0E01\u0E08\u0E30\u0E08\u0E31\u0E14\u0E01\u0E32\u0E23\u0E01\u0E31\u0E1A\u0E2D\u0E30\u0E44\u0E23\u0E1A\u0E32\u0E07\u0E2A\u0E34\u0E48\u0E07\u0E1A\u0E32\u0E07\u0E2D\u0E22\u0E48\u0E32\u0E07 \u0E08\u0E30\u0E08\u0E31\u0E14\u0E01\u0E32\u0E23\u0E44\u0E14\u0E49\u0E2D\u0E22\u0E48\u0E32\u0E07\u0E17\u0E35\u0E48\u0E04\u0E34\u0E14 \u0E41\u0E15\u0E48\u0E2B\u0E32\u0E01\u0E08\u0E30\u0E44\u0E21\u0E48\u0E0A\u0E2D\u0E1A\u0E1E\u0E24\u0E15\u0E34\u0E01\u0E23\u0E23\u0E21\u0E1A\u0E32\u0E07\u0E2A\u0E34\u0E48\u0E07\u0E1A\u0E32\u0E07\u0E2D\u0E22\u0E48\u0E32\u0E07\u0E01\u0E31\u0E1A\u0E04\u0E27\u0E32\u0E21\u0E40\u0E1B\u0E47\u0E19\u0E2D\u0E22\u0E39\u0E48 \u0E17\u0E31\u0E49\u0E07\u0E46\u0E17\u0E35\u0E48\u0E23\u0E39\u0E49 \u0E01\u0E47\u0E2B\u0E19\u0E35\u0E44\u0E21\u0E48\u0E2D\u0E2D\u0E01",
  "2-3": "\u0E08\u0E30\u0E21\u0E35\u0E01\u0E32\u0E23\u0E15\u0E34\u0E14\u0E15\u0E48\u0E2D\u0E18\u0E38\u0E23\u0E01\u0E34\u0E08\u0E01\u0E32\u0E23\u0E07\u0E32\u0E19\u0E43\u0E19\u0E23\u0E30\u0E22\u0E30\u0E2A\u0E31\u0E49\u0E19 \u0E08\u0E30\u0E16\u0E39\u0E01\u0E40\u0E1B\u0E25\u0E35\u0E48\u0E22\u0E19 \u0E16\u0E39\u0E01\u0E40\u0E25\u0E37\u0E48\u0E2D\u0E19\u0E44\u0E1B \u0E01\u0E32\u0E23\u0E17\u0E23\u0E22\u0E28 \u0E2B\u0E31\u0E01\u0E2B\u0E25\u0E31\u0E07 \u0E01\u0E32\u0E23\u0E25\u0E38\u0E48\u0E21\u0E2B\u0E25\u0E07\u0E21\u0E31\u0E27\u0E40\u0E21\u0E32 \u0E40\u0E23\u0E37\u0E48\u0E2D\u0E07\u0E04\u0E27\u0E32\u0E21\u0E23\u0E31\u0E01 \u0E0A\u0E35\u0E27\u0E34\u0E15\u0E08\u0E30\u0E2A\u0E30\u0E14\u0E38\u0E14 \u0E16\u0E49\u0E32\u0E1B\u0E23\u0E30\u0E21\u0E32\u0E17 \u0E40\u0E23\u0E34\u0E48\u0E21\u0E15\u0E49\u0E19\u0E14\u0E35 \u0E08\u0E1A\u0E44\u0E21\u0E48\u0E14\u0E35",
  "2-4": "\u0E01\u0E32\u0E23\u0E0A\u0E48\u0E27\u0E22\u0E40\u0E2B\u0E25\u0E37\u0E2D\u0E40\u0E01\u0E37\u0E49\u0E2D\u0E01\u0E39\u0E25\u0E0B\u0E36\u0E48\u0E07\u0E01\u0E31\u0E19\u0E41\u0E25\u0E30\u0E01\u0E31\u0E19 \u0E04\u0E27\u0E32\u0E21\u0E2A\u0E33\u0E40\u0E23\u0E47\u0E08\u0E2D\u0E22\u0E39\u0E48\u0E40\u0E1A\u0E37\u0E49\u0E2D\u0E07\u0E2B\u0E19\u0E49\u0E32 \u0E21\u0E35\u0E1C\u0E25\u0E2A\u0E23\u0E38\u0E1B\u0E17\u0E35\u0E48\u0E25\u0E07\u0E15\u0E31\u0E27 \u0E17\u0E38\u0E01\u0E1B\u0E31\u0E0D\u0E2B\u0E32\u0E17\u0E35\u0E48\u0E1C\u0E48\u0E32\u0E19\u0E40\u0E02\u0E49\u0E32\u0E21\u0E32\u0E43\u0E19\u0E0A\u0E35\u0E27\u0E34\u0E15 \u0E21\u0E35\u0E17\u0E32\u0E07\u0E08\u0E30\u0E41\u0E01\u0E49\u0E44\u0E02\u0E44\u0E14\u0E49 \u0E16\u0E36\u0E07\u0E40\u0E08\u0E2D\u0E40\u0E23\u0E37\u0E48\u0E2D\u0E07\u0E23\u0E49\u0E32\u0E22\u0E01\u0E47\u0E17\u0E33\u0E25\u0E32\u0E22\u0E40\u0E23\u0E32\u0E44\u0E21\u0E48\u0E44\u0E14\u0E49",
  "2-5": "\u0E08\u0E30\u0E21\u0E35\u0E40\u0E23\u0E37\u0E48\u0E2D\u0E07\u0E23\u0E49\u0E2D\u0E19\u0E43\u0E08 \u0E01\u0E31\u0E07\u0E27\u0E25\u0E43\u0E08 \u0E40\u0E23\u0E37\u0E48\u0E2D\u0E07\u0E40\u0E19\u0E37\u0E49\u0E2D \u0E40\u0E23\u0E37\u0E48\u0E2D\u0E07\u0E07\u0E32\u0E19 \u0E40\u0E23\u0E37\u0E48\u0E2D\u0E07\u0E04\u0E27\u0E32\u0E21\u0E23\u0E31\u0E01 \u0E40\u0E23\u0E37\u0E48\u0E2D\u0E07\u0E42\u0E23\u0E07 \u0E40\u0E23\u0E37\u0E48\u0E2D\u0E07\u0E28\u0E32\u0E25 \u0E40\u0E23\u0E37\u0E48\u0E2D\u0E07\u0E0A\u0E39\u0E49\u0E2A\u0E32\u0E27 \u0E40\u0E23\u0E37\u0E48\u0E2D\u0E07\u0E2B\u0E36\u0E07\u0E2B\u0E27\u0E07\u0E17\u0E27\u0E07\u0E2A\u0E34\u0E17\u0E18\u0E34\u0E4C \u0E04\u0E34\u0E14\u0E27\u0E48\u0E32\u0E15\u0E31\u0E27\u0E40\u0E1B\u0E47\u0E19\u0E40\u0E08\u0E49\u0E32\u0E02\u0E2D\u0E07\u0E44\u0E21\u0E48\u0E22\u0E2D\u0E21\u0E1B\u0E23\u0E2D\u0E07\u0E14\u0E2D\u0E07\u0E01\u0E31\u0E19\u0E07\u0E48\u0E32\u0E22\u0E46 \u0E01\u0E23\u0E23\u0E21\u0E40\u0E01\u0E48\u0E32\u0E08\u0E30\u0E21\u0E32\u0E16\u0E36\u0E07 \u0E08\u0E30\u0E15\u0E49\u0E2D\u0E07\u0E43\u0E0A\u0E49\u0E04\u0E27\u0E32\u0E21\u0E2D\u0E14\u0E17\u0E19",

  "2-8": "\u0E2A\u0E34\u0E48\u0E07\u0E17\u0E35\u0E48\u0E04\u0E34\u0E14 \u0E17\u0E35\u0E48\u0E2B\u0E27\u0E31\u0E07 \u0E2B\u0E23\u0E37\u0E2D\u0E23\u0E2D\u0E04\u0E2D\u0E22\u0E08\u0E30\u0E25\u0E49\u0E21\u0E40\u0E2B\u0E25\u0E27 \u0E25\u0E49\u0E21\u0E25\u0E30\u0E25\u0E32\u0E22",
  "2-9": "\u0E08\u0E30\u0E1C\u0E34\u0E14\u0E04\u0E33\u0E21\u0E31\u0E48\u0E19\u0E2A\u0E31\u0E0D\u0E0D\u0E32 \u0E44\u0E21\u0E48\u0E21\u0E32\u0E15\u0E32\u0E21\u0E19\u0E31\u0E14 \u0E08\u0E30\u0E40\u0E08\u0E2D\u0E04\u0E27\u0E32\u0E21\u0E2A\u0E31\u0E1A\u0E1B\u0E25\u0E31\u0E1A\u0E2B\u0E25\u0E2D\u0E01\u0E2B\u0E25\u0E27\u0E07\u0E08\u0E32\u0E01\u0E1C\u0E39\u0E49\u0E2D\u0E37\u0E48\u0E19",
  "3-1": "\u0E08\u0E30\u0E21\u0E35\u0E2B\u0E25\u0E32\u0E22\u0E40\u0E23\u0E37\u0E48\u0E2D\u0E07\u0E25\u0E31\u0E07\u0E40\u0E25 \u0E44\u0E21\u0E48\u0E01\u0E25\u0E49\u0E32\u0E15\u0E31\u0E14\u0E2A\u0E34\u0E19\u0E43\u0E08\u0E1A\u0E32\u0E07\u0E2A\u0E34\u0E48\u0E07\u0E1A\u0E32\u0E07\u0E2D\u0E22\u0E48\u0E32\u0E07\u0E41\u0E19\u0E48\u0E19\u0E2D\u0E19\u0E25\u0E07\u0E44\u0E1B\u0E43\u0E19\u0E17\u0E31\u0E19\u0E17\u0E35 \u0E08\u0E30\u0E25\u0E31\u0E07\u0E40\u0E25 \u0E19\u0E31\u0E48\u0E07\u0E2A\u0E07\u0E2A\u0E31\u0E22\u0E43\u0E2B\u0E49\u0E1C\u0E48\u0E32\u0E19\u0E0A\u0E48\u0E27\u0E07\u0E19\u0E35\u0E49\u0E44\u0E1B\u0E40\u0E2A\u0E35\u0E22\u0E01\u0E48\u0E2D\u0E19",
  "3-2": "\u0E08\u0E30\u0E21\u0E35\u0E01\u0E32\u0E23\u0E15\u0E34\u0E14\u0E15\u0E48\u0E2D\u0E18\u0E38\u0E23\u0E01\u0E34\u0E08\u0E01\u0E32\u0E23\u0E07\u0E32\u0E19\u0E43\u0E19\u0E23\u0E30\u0E22\u0E30\u0E2A\u0E31\u0E49\u0E19 \u0E08\u0E30\u0E16\u0E39\u0E01\u0E40\u0E1B\u0E25\u0E35\u0E48\u0E22\u0E19 \u0E16\u0E39\u0E01\u0E40\u0E25\u0E37\u0E48\u0E2D\u0E19\u0E44\u0E1B \u0E01\u0E32\u0E23\u0E17\u0E23\u0E22\u0E28 \u0E2B\u0E31\u0E01\u0E2B\u0E25\u0E31\u0E07 \u0E01\u0E32\u0E23\u0E25\u0E38\u0E48\u0E21\u0E2B\u0E25\u0E07\u0E21\u0E31\u0E27\u0E40\u0E21\u0E32 \u0E40\u0E23\u0E37\u0E48\u0E2D\u0E07\u0E04\u0E27\u0E32\u0E21\u0E23\u0E31\u0E01 \u0E40\u0E02\u0E32\u0E43\u0E2B\u0E49\u0E04\u0E27\u0E32\u0E21\u0E2B\u0E27\u0E31\u0E07\u0E40\u0E25\u0E47\u0E01\u0E46\u0E19\u0E49\u0E2D\u0E22\u0E46 \u0E40\u0E1E\u0E37\u0E48\u0E2D\u0E2B\u0E25\u0E2D\u0E01\u0E40\u0E2D\u0E32\u0E44\u0E27\u0E49\u0E43\u0E0A\u0E49\u0E2A\u0E2D\u0E22\u0E44\u0E1B\u0E40\u0E23\u0E37\u0E48\u0E2D\u0E22\u0E46",
  "3-3": "\u0E08\u0E30\u0E21\u0E35\u0E41\u0E15\u0E48\u0E40\u0E23\u0E37\u0E48\u0E2D\u0E07\u0E2B\u0E19\u0E31\u0E01\u0E2D\u0E01 \u0E2B\u0E19\u0E31\u0E01\u0E43\u0E08 \u0E08\u0E30\u0E15\u0E49\u0E2D\u0E07\u0E0A\u0E34\u0E07\u0E44\u0E2B\u0E27\u0E1E\u0E23\u0E34\u0E1A \u0E09\u0E27\u0E22\u0E42\u0E2D\u0E01\u0E32\u0E2A\u0E23\u0E27\u0E1A\u0E23\u0E31\u0E14\u0E15\u0E31\u0E14\u0E15\u0E2D\u0E19 \u0E40\u0E1E\u0E37\u0E48\u0E2D\u0E43\u0E2B\u0E49\u0E17\u0E31\u0E19\u0E40\u0E2B\u0E15\u0E38\u0E01\u0E32\u0E23\u0E13\u0E4C \u0E40\u0E2B\u0E47\u0E19\u0E17\u0E48\u0E32\u0E44\u0E21\u0E48\u0E14\u0E35 \u0E43\u0E2B\u0E49\u0E0A\u0E34\u0E48\u0E07\u0E2B\u0E19\u0E35\u0E44\u0E1B\u0E40\u0E2A\u0E35\u0E22\u0E01\u0E48\u0E2D\u0E19",
  "3-4": "\u0E08\u0E30\u0E44\u0E14\u0E49\u0E23\u0E31\u0E1A\u0E02\u0E48\u0E32\u0E27 \u0E40\u0E1B\u0E47\u0E19\u0E02\u0E48\u0E32\u0E27\u0E17\u0E32\u0E07\u0E25\u0E1A \u0E02\u0E48\u0E32\u0E27\u0E0B\u0E38\u0E1A\u0E0B\u0E34\u0E1A\u0E19\u0E34\u0E19\u0E17\u0E32 \u0E1F\u0E31\u0E07\u0E41\u0E25\u0E49\u0E27\u0E08\u0E30\u0E23\u0E39\u0E49\u0E2A\u0E36\u0E01\u0E1C\u0E34\u0E14\u0E2B\u0E27\u0E31\u0E07 \u0E44\u0E21\u0E48\u0E2A\u0E1A\u0E2D\u0E32\u0E23\u0E21\u0E13\u0E4C \u0E1B\u0E27\u0E14\u0E2B\u0E31\u0E27 \u0E1B\u0E27\u0E14\u0E1F\u0E31\u0E19 \u0E1D\u0E31\u0E19\u0E44\u0E21\u0E48\u0E14\u0E35",
  "3-5": "\u0E2D\u0E33\u0E19\u0E32\u0E08\u0E04\u0E27\u0E32\u0E21\u0E21\u0E31\u0E48\u0E07\u0E21\u0E35 \u0E01\u0E32\u0E23\u0E0A\u0E48\u0E27\u0E22\u0E40\u0E2B\u0E25\u0E37\u0E2D\u0E2A\u0E19\u0E31\u0E1A\u0E2A\u0E19\u0E38\u0E19 \u0E1B\u0E23\u0E30\u0E2A\u0E32\u0E19\u0E07\u0E32\u0E19\u0E43\u0E2B\u0E49\u0E44\u0E14\u0E49\u0E23\u0E31\u0E1A\u0E04\u0E27\u0E32\u0E21\u0E2A\u0E30\u0E14\u0E27\u0E01",
  "3-6": "\u0E08\u0E30\u0E21\u0E35\u0E01\u0E32\u0E23\u0E19\u0E31\u0E14\u0E2B\u0E21\u0E32\u0E22 \u0E40\u0E1E\u0E37\u0E48\u0E2D\u0E1A\u0E2D\u0E01\u0E23\u0E32\u0E22\u0E25\u0E30\u0E40\u0E2D\u0E35\u0E22\u0E14 \u0E01\u0E32\u0E23\u0E23\u0E49\u0E2D\u0E07\u0E02\u0E2D\u0E04\u0E27\u0E32\u0E21\u0E0A\u0E48\u0E27\u0E22\u0E40\u0E2B\u0E25\u0E37\u0E2D \u0E40\u0E1E\u0E37\u0E48\u0E2D\u0E1C\u0E31\u0E14\u0E1C\u0E48\u0E2D\u0E19 \u0E22\u0E37\u0E14\u0E40\u0E27\u0E25\u0E32\u0E43\u0E2B\u0E49\u0E04\u0E25\u0E32\u0E22\u0E01\u0E31\u0E07\u0E27\u0E25\u0E44\u0E27\u0E49\u0E0A\u0E31\u0E48\u0E27\u0E04\u0E23\u0E32\u0E27",
  "3-7": "\u0E08\u0E30\u0E21\u0E35\u0E40\u0E23\u0E37\u0E48\u0E2D\u0E07\u0E02\u0E31\u0E14\u0E41\u0E22\u0E49\u0E07\u0E44\u0E21\u0E48\u0E25\u0E07\u0E15\u0E31\u0E27\u0E41\u0E25\u0E30\u0E44\u0E21\u0E48\u0E25\u0E07\u0E40\u0E2D\u0E22 \u0E08\u0E30\u0E40\u0E2D\u0E37\u0E49\u0E2D\u0E19\u0E40\u0E2D\u0E22\u0E40\u0E23\u0E37\u0E48\u0E2D\u0E07\u0E2D\u0E30\u0E44\u0E23 \u0E44\u0E21\u0E48\u0E40\u0E2B\u0E21\u0E32\u0E30\u0E2A\u0E21 \u0E2D\u0E32\u0E23\u0E21\u0E13\u0E4C\u0E2B\u0E21\u0E32\u0E22",
  "3-8": "\u0E08\u0E30\u0E27\u0E34\u0E1B\u0E23\u0E34\u0E15\u0E1C\u0E34\u0E14\u0E41\u0E1B\u0E25\u0E01\u0E41\u0E2B\u0E27\u0E01\u0E41\u0E19\u0E27 \u0E2A\u0E34\u0E48\u0E07\u0E17\u0E35\u0E48\u0E04\u0E34\u0E14\u0E17\u0E35\u0E48\u0E2B\u0E27\u0E31\u0E07 \u0E08\u0E30\u0E44\u0E21\u0E48\u0E40\u0E1B\u0E47\u0E19\u0E44\u0E1B\u0E15\u0E32\u0E21\u0E41\u0E1C\u0E19\u0E01\u0E32\u0E23\u0E17\u0E35\u0E48\u0E27\u0E32\u0E07\u0E44\u0E27\u0E49 \u0E08\u0E30\u0E19\u0E33\u0E0A\u0E35\u0E27\u0E34\u0E15\u0E41\u0E19\u0E27\u0E04\u0E27\u0E32\u0E21\u0E04\u0E34\u0E14\u0E2D\u0E2D\u0E01\u0E44\u0E1B\u0E19\u0E2D\u0E01\u0E40\u0E2A\u0E49\u0E19\u0E17\u0E32\u0E07 \u0E0A\u0E35\u0E27\u0E34\u0E15\u0E08\u0E30\u0E2A\u0E30\u0E14\u0E38\u0E14\u0E44\u0E14\u0E49\u0E07\u0E48\u0E32\u0E22",
  "3-9": "\u0E08\u0E30\u0E40\u0E2B\u0E19\u0E37\u0E48\u0E2D\u0E22\u0E43\u0E08 \u0E08\u0E30\u0E21\u0E35\u0E40\u0E23\u0E37\u0E48\u0E2D\u0E07\u0E04\u0E27\u0E32\u0E21\u0E2B\u0E27\u0E32\u0E14\u0E23\u0E30\u0E41\u0E27\u0E07 \u0E08\u0E30\u0E21\u0E35\u0E28\u0E31\u0E15\u0E23\u0E39\u0E25\u0E31\u0E1A\u0E2B\u0E23\u0E37\u0E2D\u0E28\u0E31\u0E15\u0E23\u0E39\u0E1C\u0E39\u0E49\u0E43\u0E01\u0E25\u0E49\u0E15\u0E31\u0E27 \u0E01\u0E32\u0E23\u0E40\u0E14\u0E34\u0E19\u0E17\u0E32\u0E07\u0E04\u0E48\u0E2D\u0E19\u0E02\u0E49\u0E32\u0E07\u0E2A\u0E31\u0E1A\u0E2A\u0E19",
  "4-4": "\u0E08\u0E30\u0E15\u0E49\u0E2D\u0E07\u0E2D\u0E14\u0E17\u0E19 \u0E2D\u0E14\u0E01\u0E25\u0E31\u0E49\u0E19 \u0E2B\u0E31\u0E01\u0E2B\u0E49\u0E32\u0E21\u0E43\u0E08\u0E43\u0E2B\u0E49\u0E21\u0E35\u0E04\u0E27\u0E32\u0E21\u0E09\u0E25\u0E32\u0E14 \u0E08\u0E36\u0E07\u0E08\u0E30\u0E1B\u0E23\u0E30\u0E2A\u0E1A\u0E04\u0E27\u0E32\u0E21\u0E2A\u0E33\u0E40\u0E23\u0E47\u0E08",
  "4-5": "\u0E2A\u0E34\u0E48\u0E07\u0E17\u0E35\u0E48\u0E2B\u0E27\u0E31\u0E07\u0E08\u0E30\u0E1E\u0E25\u0E34\u0E01\u0E25\u0E47\u0E2D\u0E04 \u0E01\u0E32\u0E23\u0E40\u0E07\u0E34\u0E19\u0E01\u0E32\u0E23\u0E07\u0E32\u0E19 \u0E04\u0E27\u0E32\u0E21\u0E44\u0E21\u0E48\u0E0B\u0E37\u0E48\u0E2D\u0E2A\u0E31\u0E15\u0E22\u0E4C \u0E17\u0E33\u0E25\u0E32\u0E22\u0E04\u0E27\u0E32\u0E21\u0E15\u0E31\u0E49\u0E07\u0E43\u0E08\u0E40\u0E14\u0E34\u0E21\u0E43\u0E2B\u0E49\u0E1E\u0E25\u0E34\u0E01\u0E1C\u0E31\u0E19\u0E44\u0E1B\u0E19\u0E2D\u0E01\u0E17\u0E32\u0E07",
  "4-6": "\u0E2B\u0E21\u0E32\u0E22\u0E16\u0E36\u0E07\u0E01\u0E32\u0E23\u0E25\u0E07\u0E17\u0E38\u0E19 \u0E01\u0E32\u0E23\u0E0B\u0E37\u0E49\u0E2D\u0E02\u0E32\u0E22 \u0E01\u0E32\u0E23\u0E25\u0E07\u0E17\u0E38\u0E19\u0E08\u0E30\u0E44\u0E21\u0E48\u0E14\u0E35 \u0E15\u0E01\u0E2D\u0E22\u0E39\u0E48\u0E43\u0E19\u0E15\u0E33\u0E41\u0E2B\u0E19\u0E48\u0E07\u0E14\u0E35 \u0E01\u0E32\u0E23\u0E25\u0E07\u0E17\u0E38\u0E19\u0E01\u0E47\u0E08\u0E30\u0E14\u0E35",
  "4-7": "\u0E44\u0E21\u0E48\u0E23\u0E39\u0E49\u0E08\u0E30\u0E40\u0E23\u0E34\u0E48\u0E21\u0E15\u0E49\u0E19\u0E2D\u0E22\u0E48\u0E32\u0E07\u0E44\u0E23\u0E14\u0E35 \u0E40\u0E2B\u0E21\u0E37\u0E2D\u0E19\u0E04\u0E19\u0E40\u0E21\u0E32 \u0E16\u0E36\u0E07\u0E41\u0E21\u0E49\u0E0A\u0E35\u0E27\u0E34\u0E15\u0E08\u0E30\u0E40\u0E14\u0E34\u0E19\u0E17\u0E32\u0E07\u0E21\u0E32\u0E16\u0E36\u0E07\u0E0B\u0E36\u0E48\u0E07\u0E04\u0E27\u0E32\u0E21\u0E21\u0E31\u0E48\u0E19\u0E04\u0E07\u0E01\u0E47\u0E15\u0E32\u0E21 \u0E23\u0E30\u0E27\u0E31\u0E07\u0E2D\u0E22\u0E48\u0E32\u0E43\u0E2B\u0E49\u0E04\u0E27\u0E32\u0E21\u0E42\u0E01\u0E23\u0E18 \u0E04\u0E27\u0E32\u0E21\u0E42\u0E25\u0E20 \u0E04\u0E27\u0E32\u0E21\u0E2B\u0E25\u0E07\u0E1C\u0E34\u0E14 \u0E19\u0E33\u0E1E\u0E32\u0E43\u0E2B\u0E49\u0E40\u0E14\u0E34\u0E19\u0E2B\u0E25\u0E07\u0E17\u0E32\u0E07",

  txt += "══════ ความหมาย 7 ช่อง ══════\n\n";
  SNAMES.forEach((sname, si) => {
    const cols = findCols([result.table2[0],result.table2[1],result.table2[2]], si+1);

function downloadText(result, form) {
